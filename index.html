<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NIFTY 50 Advanced Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
    <h1>📊 NIFTY 50 Dashboard</h1>
</header>

<div class="container">

    <!-- Controls -->
    <div class="controls">
        <input type="text" id="search" placeholder="Search stock..." onkeyup="filterStocks()">
        <button onclick="sortGainers()">Top Gainers</button>
        <button onclick="sortLosers()">Top Losers</button>
        <button onclick="resetData()">Reset</button>
        <button onclick="showTrends()">📈 Show Trends</button>
    </div>

    <!-- KPI Cards -->
    <div class="kpis">
        <div class="kpi">
            <h3>Avg Price</h3>
            <p id="avgPrice">-</p>
        </div>
        <div class="kpi">
            <h3>Top Gainer</h3>
            <p id="topGainer">-</p>
        </div>
        <div class="kpi">
            <h3>Top Loser</h3>
            <p id="topLoser">-</p>
        </div>
    </div>

    <!-- Stock Cards -->
    <div id="stockContainer" class="cards"></div>

    <!-- Chart -->
    <div class="chart-container">
        <canvas id="chart"></canvas>
    </div>

    <!-- Trend Section -->
    <div id="trendSection" class="trend-section">
        <h2>📈 Market Trends</h2>
        <div id="trendContent"></div>
    </div>

</div>

<footer>
    <p>© 2026 Ritesh Salunke</p>
</footer>

<script src="script.js"></script>
</body>
</html>
